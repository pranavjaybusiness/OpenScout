# CloudWatch alarm: fires on each "No" match feedback (FeedbackMatchNo >= 1 per minute).
# Deploy in us-east-2 (same region as Lambda). Stack creates SNS email; confirm subscription in inbox.
AWSTemplateFormatVersion: "2010-09-09"
Description: OpenScout alarm when user clicks No on Same product? feedback

Parameters:
  AlertEmail:
    Type: String
    Description: Email address for alarm notifications
    AllowedPattern: "^[^@]+@[^@]+\\.[^@]+$"
  MetricNamespace:
    Type: String
    Default: OpenScout
  MetricName:
    Type: String
    Default: FeedbackMatchNo
    Description: Must match FEEDBACK_MATCH_NO_METRIC in backend/src/constants.py

Resources:
  FeedbackNoTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: OpenScout-FeedbackMatchNo
      DisplayName: OpenScout negative match feedback

  FeedbackNoEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref FeedbackNoTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  FeedbackNoAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: OpenScout-FeedbackMatchNo
      AlarmDescription: User clicked No on Same product? — investigate scan in OpenScoutHistory / logs
      Namespace: !Ref MetricNamespace
      MetricName: !Ref MetricName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref FeedbackNoTopic
      OKActions:
        - !Ref FeedbackNoTopic

Outputs:
  AlarmName:
    Value: !Ref FeedbackNoAlarm
  SnsTopicArn:
    Value: !Ref FeedbackNoTopic
  ConfirmSubscriptionNote:
    Value: Check your email and confirm the SNS subscription before alarms will arrive.
